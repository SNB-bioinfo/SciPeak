const BODY={
tr:[
"Bir düşünün: Doktora gitmeden önce vücudunuzun dijital bir kopyası oluşturuluyor. Bu kopya sizin kan değerlerinizi, genetik özelliklerinizi, kalp atışlarınızı, metabolizmanızı, hatta günlük yaşam alışkanlıklarınızı takip ediyor. Sonra da şu sorulara cevap arıyor: “Bu hastalık ilerler mi?”, “Bu ilaç bu kişide işe yarar mı?”, “Tedaviye vücut nasıl tepki verir?”",
"İşte bu fikir, günümüzde <em>digital twin</em>, yani dijital ikiz teknolojisiyle giderek daha gerçekçi hale geliyor.",
"Digital twin, en basit haliyle gerçek bir sistemin bilgisayar ortamında oluşturulan sanal kopyasıdır. Bu kavram ilk olarak mühendislik ve endüstri alanlarında öne çıksa da artık biyoloji ve sağlık alanında da dikkat çekmeye başlamıştır. Çünkü insan vücudu da aslında sürekli çalışan, değişen ve farklı faktörlerden etkilenen karmaşık bir sistemdir.",
"Biyolojik açıdan digital twin, bir hücrenin, organın, metabolik sürecin, hastalığın ya da hastanın dijital ortamda modellenmesi anlamına gelir. Yani amaç, vücutta gerçekleşen olayları bilgisayar üzerinde taklit etmek ve bu model üzerinden tahminler yapabilmektir. Örneğin bir hastanın kan şekeri, kalp ritmi, genetik bilgileri, görüntüleme sonuçları, beslenme düzeni ve fiziksel aktivitesi birlikte değerlendirilerek kişiye özel bir dijital model oluşturulabilir.",
"Bu teknoloji özellikle kişiselleştirilmiş tıp açısından oldukça önemlidir. Çünkü her insanın biyolojik yapısı aynı değildir. Aynı hastalık iki kişide farklı ilerleyebilir. Aynı ilaç bir kişide etkili olurken başka bir kişide yeterli sonuç vermeyebilir. Digital twin yaklaşımı da tam olarak bu noktada devreye girer. Hastaya özel oluşturulan dijital model sayesinde tedavinin nasıl sonuç verebileceği önceden tahmin edilmeye çalışılır.",
"Bu alanda yapılan çalışmalardan biri kalp üzerine odaklanmaktadır. Dassault Systèmes, “Living Heart Project” adlı çalışmasıyla insan kalbinin dijital bir modelini geliştirmiştir. Bu model sayesinde kalbin yapısı ve hareketleri sanal ortamda incelenebilir. Böylece kalp hastalıkları, medikal cihazlar ve tedavi seçenekleri bilgisayar ortamında test edilebilir.",
"Bir diğer örnek ise metabolizma alanındadır. Twin Health, kişinin kan şekeri, uyku, aktivite ve beslenme verilerini kullanarak metabolik sağlığı takip etmeye yönelik bir dijital ikiz yaklaşımı geliştirmektedir. Bu sistem, özellikle diyabet ve metabolik hastalıkların yönetiminde kişiye özel öneriler sunmayı hedeflemektedir.",
"Siemens Healthineers ise “digital patient twin” kavramı üzerinde çalışmaktadır. Bu yaklaşımda hastanın sağlık verileri bir araya getirilerek tanı ve tedavi süreçlerinde daha kişisel kararlar alınması amaçlanır. Unlearn AI ise klinik araştırmalarda dijital ikizleri kullanarak hastaların tedaviye verebileceği yanıtları tahmin etmeye çalışmaktadır. Bu da gelecekte klinik çalışmaların daha hızlı ve verimli ilerlemesine katkı sağlayabilir.",
"Digital twin teknolojisinin en ilgi çekici tarafı, biyolojiyi sabit bir yapı gibi değil, sürekli değişen canlı bir sistem gibi ele almasıdır. Çünkü insan vücudu; beslenme, çevre, stres, ilaç kullanımı, genetik yapı ve hastalık durumuna göre sürekli değişir. Dijital ikizler de bu değişimi takip ederek daha güncel ve kişiye özel analizler yapılmasına yardımcı olabilir.",
"Elbette bu teknolojinin bazı sınırlamaları da vardır. Güvenilir bir dijital ikiz oluşturmak için çok fazla ve kaliteli veriye ihtiyaç duyulur. Ayrıca hasta verilerinin gizliliği, etik kurallar, yapay zekâ modelinin doğruluğu ve klinik güvenilirlik gibi konular dikkatle değerlendirilmelidir. Bu nedenle digital twin teknolojisi umut verici olsa da sağlık alanında kontrollü ve bilimsel temellere dayalı şekilde kullanılmalıdır.",
"Sonuç olarak digital twin, biyoloji ve yapay zekânın birleştiği en dikkat çekici alanlardan biridir. Gelecekte hastalıkların daha erken fark edilmesi, tedavilerin kişiye özel planlanması ve ilaç geliştirme süreçlerinin hızlanması için önemli bir rol oynayabilir. Belki de yakın gelecekte doktorlar yalnızca bizi değil, bizim dijital kopyamızı da inceleyerek tedavi kararları verecek."
],
en:[
"Imagine this: Before going to the doctor, a digital copy of your body is created. This copy tracks your blood values, genetic traits, heart rate, metabolism, and even your daily lifestyle habits. Then, it seeks answers to questions like: “Will this disease progress?”, “Will this drug work for this person?”, “How will the body react to the treatment?”",
"This idea is becoming increasingly realistic today with <em>digital twin</em> technology.",
"A digital twin, in its simplest form, is a virtual copy of a real system created in a computer environment. Although this concept first gained prominence in engineering and industrial fields, it has now begun to attract attention in biology and healthcare. Because the human body is actually a complex system that constantly works, changes, and is affected by various factors.",
"Biologically, a digital twin means modeling a cell, organ, metabolic process, disease, or patient in a digital environment. In other words, the goal is to simulate events occurring in the body on a computer and make predictions based on this model. For instance, a personalized digital model can be created by evaluating a patient's blood sugar, heart rhythm, genetic information, imaging results, diet, and physical activity together.",
"This technology is especially crucial for personalized medicine. Because every human's biological structure is not the same. The same disease can progress differently in two people. The same drug may be effective for one person while failing to provide adequate results for another. The digital twin approach comes into play exactly at this point. Thanks to the personalized digital model, it is attempted to predict in advance how the treatment will result.",
"One of the studies focusing on this area is on the heart. Dassault Systèmes has developed a digital model of the human heart with its study called the 'Living Heart Project'. Through this model, the structure and movements of the heart can be examined in a virtual environment. Thus, heart diseases, medical devices, and treatment options can be tested on a computer.",
"Another example is in the field of metabolism. Twin Health is developing a digital twin approach aimed at tracking metabolic health using a person's blood sugar, sleep, activity, and nutrition data. This system aims to offer personalized recommendations, especially in the management of diabetes and metabolic diseases.",
"Siemens Healthineers, on the other hand, is working on the concept of a 'digital patient twin'. This approach aims to bring the patient's health data together to make more personalized decisions in diagnosis and treatment processes. Unlearn AI is trying to predict patients' responses to treatments using digital twins in clinical trials. This could contribute to faster and more efficient clinical studies in the future.",
"The most intriguing aspect of digital twin technology is that it treats biology not as a static structure, but as a continuously changing living system. Because the human body constantly changes according to diet, environment, stress, medication use, genetic makeup, and disease state. Digital twins can track this change, helping to perform more updated and personalized analyses.",
"Of course, this technology also has some limitations. Creating a reliable digital twin requires a vast amount of high-quality data. Furthermore, issues such as patient data privacy, ethical rules, the accuracy of the artificial intelligence model, and clinical reliability must be carefully evaluated. Therefore, although digital twin technology is promising, it should be used in healthcare in a controlled manner based on scientific foundations.",
"In conclusion, digital twin is one of the most fascinating areas where biology and artificial intelligence converge. In the future, it could play a significant role in detecting diseases earlier, planning personalized treatments, and accelerating drug development processes. Perhaps in the near future, doctors will make treatment decisions by examining not only us but also our digital copies."
]

        <li>Vidovszky, A. A., et al. (2024). Increasing acceptance of AI-generated digital twins through clinical trial applications. <i>Clinical and Translational Science</i>, 17. <a href="https://doi.org/10.1111/cts.13897" target="_blank" rel="noopener">https://doi.org/10.1111/cts.13897</a></li>

};

let lang='tr';
try{const sv=localStorage.getItem('scipeak_lang');if(sv)lang=sv}catch{}

function render(){
  document.documentElement.lang=lang;
  const paras=BODY[lang].map(p=>'<p>'+p+'</p>');
  
  // Append references to the end of the content
  document.getElementById('content').innerHTML=paras.join('') + REFS[lang];
  
  document.querySelectorAll('[data-tr]').forEach(el=>{
    const v=el.getAttribute('data-'+lang);if(v==null)return;
    if(v.includes('<b>'))el.innerHTML=v;else el.textContent=v;
  });
  document.getElementById('langToggle').innerHTML=lang==='tr'?'<b>TR</b> / EN':'TR / <b>EN</b>';
  renderRelated();
}

document.getElementById('langToggle').addEventListener('click',()=>{
  lang=lang==='tr'?'en':'tr';
  try{localStorage.setItem('scipeak_lang',lang)}catch{}
  render();
});

render();
</script>
