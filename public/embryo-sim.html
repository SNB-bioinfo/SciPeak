<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg0: #04060b;
      --bg1: #080d16;
      --ink: #e9eef6;
      --ink-dim: #8da0bd;
      --ink-faint: #5b6b86;
      --cyan: #54e6c8;
      --cyan-soft: #8af0da;
      --amber: #f0b878;
      --panel: rgba(8, 14, 24, .78);
      --panel-bd: rgba(100, 140, 190, .16)
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      height: 100%
    }

    body {
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--ink);
      background: radial-gradient(120% 90% at 50% 18%, #12203a 0%, var(--bg1) 42%, var(--bg0) 100%);
      overflow: hidden
    }

    #stage {
      position: fixed;
      inset: 0
    }

    canvas {
      display: block;
      touch-action: none
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(120% 100% at 50% 45%, transparent 52%, rgba(0, 0, 0, .65) 100%)
    }

    #scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background: repeating-linear-gradient(0deg, rgba(255, 255, 255, .01) 0 1px, transparent 1px 3px)
    }

    .hud {
      position: fixed;
      z-index: 5;
      pointer-events: none
    }

    #info {
      left: clamp(14px, 2.5vw, 34px);
      top: clamp(14px, 2.5vh, 30px);
      max-width: min(370px, 76vw);
      background: var(--panel);
      border: 1px solid var(--panel-bd);
      border-radius: 14px;
      padding: 16px 18px 17px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px -24px rgba(0, 0, 0, .8), inset 0 1px 0 rgba(255, 255, 255, .04)
    }

    .eyebrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--cyan);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 11px
    }

    .eyebrow::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px 1px var(--cyan)
    }

    #stageNo {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--ink-faint);
      margin-left: auto;
      letter-spacing: .1em
    }

    #title {
      font-size: 23px;
      font-weight: 600;
      line-height: 1.06;
      margin: 0 0 3px;
      letter-spacing: -.01em
    }

    #time {
      font-family: "JetBrains Mono", monospace;
      font-size: 11.5px;
      color: var(--amber);
      letter-spacing: .04em;
      margin-bottom: 11px
    }

    #note {
      font-size: 13px;
      line-height: 1.5;
      color: var(--ink-dim);
      margin: 0
    }

    #flash {
      right: clamp(14px, 2.5vw, 34px);
      top: clamp(14px, 2.5vh, 30px);
      max-width: min(310px, 72vw);
      background: linear-gradient(135deg, rgba(84, 230, 200, .14), rgba(84, 230, 200, .03));
      border: 1px solid rgba(84, 230, 200, .32);
      border-radius: 13px;
      padding: 13px 15px;
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity .5s ease, transform .5s ease
    }

    #flash.show {
      opacity: 1;
      transform: none
    }

    #flash .lab {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--cyan-soft);
      margin-bottom: 6px
    }

    #flash .msg {
      font-size: 13px;
      line-height: 1.4;
      color: var(--ink)
    }

    #transport {
      position: fixed;
      z-index: 6;
      left: 50%;
      transform: translateX(-50%);
      bottom: clamp(16px, 3vh, 30px);
      width: min(720px, 92vw);
      background: var(--panel);
      border: 1px solid var(--panel-bd);
      border-radius: 16px;
      padding: 13px 16px 11px;
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px -28px rgba(0, 0, 0, .85), inset 0 1px 0 rgba(255, 255, 255, .04)
    }

    .row {
      display: flex;
      align-items: center;
      gap: 13px
    }

    button.ctrl {
      appearance: none;
      border: 1px solid var(--panel-bd);
      background: rgba(255, 255, 255, .04);
      color: var(--ink);
      width: 42px;
      height: 42px;
      border-radius: 11px;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      transition: .15s
    }

    button.ctrl:hover {
      background: rgba(84, 230, 200, .12);
      border-color: rgba(84, 230, 200, .4)
    }

    button.ctrl:active {
      transform: scale(.94)
    }

    button.ctrl svg {
      width: 18px;
      height: 18px;
      fill: currentColor
    }

    button.small {
      width: 36px;
      height: 36px
    }

    button.small svg {
      width: 15px;
      height: 15px
    }

    .track-wrap {
      flex: 1;
      position: relative;
      height: 42px;
      display: flex;
      align-items: center
    }

    #track {
      position: absolute;
      left: 0;
      right: 0;
      height: 5px;
      border-radius: 99px;
      background: rgba(140, 170, 210, .12)
    }

    #fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--amber), var(--cyan));
      box-shadow: 0 0 12px -2px var(--cyan)
    }

    #scrubhead {
      position: absolute;
      top: 50%;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 4px rgba(84, 230, 200, .2), 0 0 14px 1px rgba(84, 230, 200, .5);
      cursor: grab
    }

    #scrubhead:active {
      cursor: grabbing
    }

    .ticks {
      position: absolute;
      left: 0;
      right: 0;
      top: 26px;
      display: flex;
      justify-content: space-between
    }

    .tick {
      font-family: "JetBrains Mono", monospace;
      font-size: 9px;
      color: var(--ink-faint);
      letter-spacing: .04em;
      text-align: center;
      transition: color .2s;
      cursor: pointer
    }

    .tick.active {
      color: var(--cyan)
    }

    .tick .dot {
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--ink-faint);
      margin: 0 auto 4px;
      transition: .2s
    }

    .tick.active .dot {
      background: var(--cyan);
      box-shadow: 0 0 8px 1px var(--cyan)
    }

    .ld-lab {
      position: absolute;
      transform: translateY(-50%);
      font-family: "JetBrains Mono", monospace;
      white-space: nowrap;
      will-change: left, top
    }

    .ld-lab .ld-t {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .04em;
      color: var(--amber)
    }

    .ld-lab .ld-s {
      font-size: 10px;
      letter-spacing: .02em;
      color: var(--ink-faint);
      margin-top: 1px
    }

    .ld-lab.align-right {
      transform: translate(-100%, -50%);
      text-align: right
    }

    #hint {
      position: fixed;
      z-index: 4;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(clamp(16px, 3vh, 30px) + 118px);
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      pointer-events: none;
      transition: opacity .6s
    }

    #noteToggle {
      display: none;
      margin-top: 8px;
      background: rgba(84, 230, 200, .12);
      border: 1px solid rgba(84, 230, 200, .32);
      color: var(--cyan);
      font-family: "JetBrains Mono", monospace;
      font-size: 9.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 8px;
      cursor: pointer
    }

    @media(max-width:560px) {
      #title {
        font-size: 15.5px
      }

      .ticks {
        top: 25px
      }

      .tick {
        font-size: 0
      }

      .tick.active {
        font-size: 8px
      }

      .tick .dot {
        width: 5px;
        height: 5px;
        margin: 0 auto 3px
      }


      #transport {
        padding: 11px 13px 12px
      }

      #info {
        max-height: calc(100% - 160px);
        overflow-y: auto;
        max-width: min(255px, 66vw);
        padding: 11px 12px 12px;
        border-radius: 12px;
      }

      #info.collapsed #note {
        max-height: 1.5em;
        overflow: hidden;
        -webkit-mask-image: linear-gradient(90deg, #000 70%, transparent);
        mask-image: linear-gradient(90deg, #000 70%, transparent);
      }

      #noteToggle {
        display: inline-block;
      }

      .eyebrow {
        font-size: 9px;
        margin-bottom: 7px;
      }

      #time {
        font-size: 10px;
        margin-bottom: 7px;
      }

      #note {
        font-size: 10.5px;
        line-height: 1.45;
      }

      #flash {
        display: block;
        left: 10px;
        right: 10px;
        top: auto;
        bottom: calc(clamp(16px, 3vh, 30px) + 96px);
        max-width: none;
        padding: 10px 13px;
        transform: translateY(8px);
      }

      #flash.show {
        transform: none;
      }

      #flash .msg {
        font-size: 11px;
      }

      #hint {
        display: none;
      }
    }

  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="vignette"></div>
  <div id="scanline"></div>
  <div id="info" class="hud">
    <div class="eyebrow">İnsan embriyosu <span id="stageNo">00 / 07</span></div>
    <h1 id="title">—</h1>
    <div id="time">—</div>
    <p id="note">—</p>
    <button id="noteToggle" type="button" style="pointer-events:auto">Devamını oku</button>
  </div>

  <div id="flash" class="hud">
    <div class="lab">Moleküler olay</div>
    <div class="msg" id="flashMsg"></div>
  </div>
  <div id="hint">Sürükle: döndür · Tekerlek: yakınlaş</div>
  <canvas id="blast2d" style="position:fixed;inset:0;width:100%;height:100%;z-index:4;pointer-events:none;opacity:0;transition:opacity .5s"></canvas>
  <div id="transport">
    <div class="row">
      <button class="ctrl" id="play"><svg id="playIcon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg><svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
          <path d="M6 5h4v14H6zM14 5h4v14h-4z" />
        </svg></button>
      <button class="ctrl small" id="reset"><svg viewBox="0 0 24 24">
          <path d="M12 5V1L7 6l5 5V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z" />
        </svg></button>
      <div class="track-wrap">
        <div id="track">
          <div id="fill"></div>
          <div id="scrubhead"></div>
        </div>
        <div class="ticks" id="ticks"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function () {
      'use strict';
      var T = window.THREE;
      var RM = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

      // Site dilini ana sayfadan (localStorage) devral; URL ?lang= ile de geçersiz kılınabilir
      var LANG = 'tr';
      try {
        var qp = new URLSearchParams(window.location.search).get('lang');
        var sv = qp || localStorage.getItem('scipeak_lang');
        if (sv === 'en') LANG = 'en';
      } catch (e) {}
      document.documentElement.lang = LANG;
      function L(st, key) { return (LANG === 'en' && st[key + '_en'] != null) ? st[key + '_en'] : st[key]; }
      // Sabit arayüz metinleri
      var UI = {
        eyebrow: { tr: 'İnsan embriyosu', en: 'Human embryo' },
        flashLab: { tr: 'Moleküler olay', en: 'Molecular event' },
        hint: { tr: 'Sürükle: döndür · Tekerlek: yakınlaş', en: 'Drag: rotate · Wheel: zoom' }
      };


      /* ================================================================
         STAGE DATA — İnsan embriyosu, bilimsel doğrulama:
         - ZGA insanda 4-8 hücre arasında, 8-hücre evresinde belirginleşir
         - Mayoz II sperm girişinin akabinde tamamlanır
         - Kompaktlaşma ~8-16 hücre arasında
         - Blastosist insan için ~Gün 5-6
         - EPI/PrE ayrışması blastosistte (ICM içi)
         - Hatching ~Gün 5-7, doğal veya yardımlı
      ================================================================ */
      var STAGES = [
        {
          title: 'Sekonder Oosit',
          time: 'Döllenme öncesi',
          note: 'Ovulasyonla birlikte yumurtalıktan salınan oosit, Metafaz II\'de duraklamıştır. İlk polar cisim perivitellin aralıkta; Zona Pellucida (ZP) glikoprotein kabuğu bütünlüğünü korumaktadır. Oosit, fallopyan tüpünde sperm ile karşılaşmayı bekler.',
          title_en: 'Secondary Oocyte',
          time_en: 'Before fertilization',
          note_en: 'Released from the ovary at ovulation, the oocyte is arrested in Metaphase II. The first polar body sits in the perivitelline space; the Zona Pellucida (ZP) glycoprotein shell remains intact. The oocyte awaits the sperm in the fallopian tube.'
        },
        {
          title: 'Fertilizasyon',
          time: 'Saat 0–12',
          flash: 'Akrozom reaksiyonu: ZP3 bağlanması ile akrozomal enzimatler salgılanır.',
          note: 'Sperm başı ZP\'ye bağlanır; akrozom reaksiyonu ile hyaluronidaz ve akrozin salgılanarak glikoprotein tabaka eritilir. Yalnızca baş ve boyun bölgesi ooplazmayla kaynaşır — kuyruk dışarıda kalır. Membran füzyonuyla kortikal granüller salınır ve ZP sertleşir (polispermi bloğu). Uyarıyla mayoz II tamamlanır; ikinci polar cisim atılır.',
          title_en: 'Fertilization',
          time_en: 'Hours 0–12',
          flash_en: 'Acrosome reaction: ZP3 binding triggers release of acrosomal enzymes.',
          note_en: 'The sperm head binds the ZP; the acrosome reaction releases hyaluronidase and acrosin to dissolve the glycoprotein layer. Only the head and neck fuse with the ooplasm — the tail stays outside. Membrane fusion releases cortical granules and hardens the ZP (block to polyspermy). The stimulus completes meiosis II and the second polar body is extruded.'
        },
        {
          title: 'Pronükleus (Zigot)',
          time: 'Saat 12–24',
          note: 'Dişi pronükleus (oositten) ve erkek pronükleus (sperm başından) oluşur; her biri yaklaşık 8 saat içinde gelişir. İkisi sitoplazmada yan yana göç ederek birleşime hazırlanır. Bu evrede iki polar cisim perivitellin aralıkta görülür. Mayoz tamamlanmış, mitoz henüz başlamamıştır.',
          title_en: 'Pronucleus (Zygote)',
          time_en: 'Hours 12–24',
          note_en: 'The female pronucleus (from the oocyte) and the male pronucleus (from the sperm head) form, each developing over about 8 hours. They migrate side by side in the cytoplasm to prepare for fusion. Two polar bodies are visible in the perivitelline space at this stage. Meiosis is complete; mitosis has not yet begun.'
        },
        {
          title: '2-Hücre',
          time: '~Gün 1.5',
          flash: 'Minör ZGA: bazı embriyonik genler ilk bölünmeyle birlikte aktive olmaya başlar.',
          note: 'İlk mitotik bölünme (cleavage) tamamlanır. İnsanda minör Zigotik Genom Aktivasyonu (ZGA) bu evrede başlar; majör aktivasyon 8-hücre evresinde gerçekleşecektir. Maternal mRNA\'lar yıkılmaya başlar. Her blastomerin çapı küçülür, toplam hacim korunur — embriyo ZP içinde kalır.',
          title_en: '2-Cell',
          time_en: '~Day 1.5',
          flash_en: 'Minor ZGA: some embryonic genes begin activating with the first division.',
          note_en: 'The first mitotic division (cleavage) is complete. In humans, minor Zygotic Genome Activation (ZGA) begins at this stage; major activation occurs at the 8-cell stage. Maternal mRNAs start to degrade. Each blastomere shrinks in diameter while total volume is conserved — the embryo stays within the ZP.'
        },
        {
          title: '4-Hücre',
          time: '~Gün 2',
          note: 'Bölünmeler devam eder; insanda bu aşamada blastomerler asenkron bölünür. Hücreler arası diferansiasyon henüz belirlenmemiştir — her blastomer teorik olarak tam embriyoyu oluşturabilir (totipotens). ZP bütünlüğünü korur.',
          title_en: '4-Cell',
          time_en: '~Day 2',
          note_en: 'Divisions continue; in humans blastomeres divide asynchronously at this stage. Differentiation between cells is not yet determined — each blastomere can in theory form a complete embryo (totipotency). The ZP remains intact.'
        },
        {
          title: '8-Hücre',
          time: '~Gün 3',
          flash: 'Majör ZGA: insanda embriyonik transkripsiyon 8-hücre evresinde belirginleşir.',
          note: 'İnsanda majör Zigotik Genom Aktivasyonu bu evrede gerçekleşir: anneye ait mRNA\'lar büyük ölçüde yıkılır, embriyonun kendi genleri transkripte edilmeye başlar. Ardından kompaktlaşma (compaction) başlar: E-kaderin aracılı hücreler arası bağlantılar güçlenir, blastomerler birbirine yapışarak dış yüzey küçülür.',
          title_en: '8-Cell',
          time_en: '~Day 3',
          flash_en: 'Major ZGA: embryonic transcription becomes prominent at the 8-cell stage in humans.',
          note_en: 'Major Zygotic Genome Activation occurs here in humans: maternal mRNAs are largely degraded and the embryo\'s own genes begin to be transcribed. Compaction then begins: E-cadherin-mediated cell junctions strengthen, blastomeres adhere and the outer surface smooths.'
        },
        {
          title: 'Morula',
          time: '~Gün 4',
          flash: 'Kompaktlaşma tamamlanır — apikal/bazal polarite ve dış/iç hücre kimliği belirlenir.',
          note: '~16–32 hücre sıkıca paketlenmiş, dıştan pürüzsüz görünen kompakt bir küre oluşturur. Dış hücreler trofektoderm (TE) progenitörlerine, iç hücreler İç Hücre Kitlesi\'ne (İHK) yönelir. Bu ilk hücre kaderi belirlemesi, blastosist kavitasyonunu hazırlar.',
          title_en: 'Morula',
          time_en: '~Day 4',
          flash_en: 'Compaction completes — apical/basal polarity and outer/inner cell identity are set.',
          note_en: '~16–32 cells form a tightly packed, outwardly smooth compact sphere. Outer cells commit to trophectoderm (TE) progenitors, inner cells to the Inner Cell Mass (ICM). This first cell-fate decision sets the stage for blastocyst cavitation.'
        },
        {
          title: 'Blastosist',
          time: '~Gün 5–6',
          flash: 'Kavitasyon: Na⁺/K⁺-ATPaz pompalarıyla blastosöl sıvısı birikir; TE ve epiblast/PrE ayrışır.',
          note: 'Trofektoderm hücreleri sıvıyı aktif olarak içeri pompalar; blastosöl boşluğu genişler. İHK, epiblaste (embriyoyu oluşturacak) ve primitif endoderme (PrE, yolk kese hücreleri) ayrışmaya başlar — ikisi birbirinden renk ve pozisyonla ayrılır. ZP gerilip inceldikçe hatching (ZP\'den çıkış) yaklaşır. IVF\'te bu evre embriyonun transfer edildiği andır.',
          title_en: 'Blastocyst',
          time_en: '~Day 5–6',
          flash_en: 'Cavitation: Na⁺/K⁺-ATPase pumps accumulate blastocoel fluid; TE and epiblast/PrE diverge.',
          note_en: 'Trophectoderm cells actively pump fluid inward; the blastocoel cavity expands. The ICM begins to split into the epiblast (which forms the embryo proper) and the primitive endoderm (PrE, yolk-sac cells) — distinguished by color and position. As the ZP stretches and thins, hatching (escape from the ZP) approaches. In IVF this is the stage at which the embryo is transferred.'
        }
      ];
      var LAST = STAGES.length - 1;
      var COUNT = [1, 1, 1, 2, 4, 8, 20, 34];
      var POOL = 34;

      // ---- renderer ----
      var host = document.getElementById('stage');
      var renderer = new T.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = T.sRGBEncoding;
      renderer.toneMapping = T.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      host.appendChild(renderer.domElement);

      var scene = new T.Scene();
      scene.fog = new T.FogExp2(0x04060b, 0.04);
      var camera = new T.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);

      // Responsive kamera: portre/dar ekranlarda embriyo kırpılmasın diye
      // FOV'u aspect oranına göre ayarla ve kamerayı gerektiğinde geri çek.
      var BASE_FOV = 42, BASE_DIST = 7.2;
      function responsiveCamera() {
        var aspect = window.innerWidth / window.innerHeight;
        camera.aspect = aspect;
        // portre (aspect<1): dikey görüş alanı dar kalır → FOV'u genişlet
        var fov = BASE_FOV;
        if (aspect < 1) fov = BASE_FOV / Math.max(aspect, 0.5);   // 0.5'te ~2x
        camera.fov = Math.min(fov, 78);
        camera.updateProjectionMatrix();
        // dar ekranda biraz daha geri çekerek nefes payı bırak
        return aspect < 0.75 ? BASE_DIST * lerp(1, 1.25, clamp((0.75 - aspect) / 0.45, 0, 1)) : BASE_DIST;
      }

      scene.add(new T.AmbientLight(0x1a2840, 0.5));
      var kL = new T.DirectionalLight(0xc8e0ff, 1.4); kL.position.set(4, 6, 5); scene.add(kL);
      var fL = new T.DirectionalLight(0x304880, 0.6); fL.position.set(-6, -2, -3); scene.add(fL);

      elSH.addEventListener('mousedown', ssStart); elTrack.addEventListener('mousedown', ssStart);
      window.addEventListener('mousemove', ssMove); window.addEventListener('mouseup', ssEnd);
      elSH.addEventListener('touchstart', ssStart, { passive: false }); elTrack.addEventListener('touchstart', ssStart, { passive: false });
      window.addEventListener('touchmove', ssMove, { passive: false }); window.addEventListener('touchend', ssEnd);

      function updateUI() {
        var frac = gv / LAST; elFill.style.width = (frac * 100) + '%'; elSH.style.left = (frac * 100) + '%';
        var si = clamp(Math.round(gv), 0, LAST), st = STAGES[si];
        var stTitle = L(st, 'title');
        if (elTitle.textContent !== stTitle) {
          elTitle.textContent = stTitle; elTime.textContent = L(st, 'time');
          elNote.textContent = L(st, 'note'); elNo.textContent = String(si).padStart(2, '0') + ' / 0' + LAST;
          if (isMobileSim && elNoteToggle) { elInfo.classList.add('collapsed'); elNoteToggle.textContent = NOTE_MORE[LANG]; }
        }
        tickEls.forEach(function (t, i) { t.classList.toggle('active', i === si); });
        if (si !== shownFlash) {
          shownFlash = si;
          var stFlash = L(st, 'flash');
          if (stFlash) {
            elFlashMsg.textContent = stFlash; elFlash.classList.add('show');
            clearTimeout(elFlash._t); elFlash._t = setTimeout(function () { elFlash.classList.remove('show'); }, 5500);
          }
          else elFlash.classList.remove('show');
        }
      }

      // ============================================================
      //  2D BLASTOSİST OVERLAY — referans estetiği (düz daireler, amber)
      //  Blastosist evresinde 3D sahne söner, bu katman belirir.
      // ============================================================
      var bcv = document.getElementById('blast2d');
      var bctx = bcv.getContext('2d');
      var B2DPR = 1;
      function sizeBlast2d() {
        B2DPR = Math.min(window.devicePixelRatio || 1, 2);
        bcv.width = window.innerWidth * B2DPR;
        bcv.height = window.innerHeight * B2DPR;
      }
      sizeBlast2d();

      // referanstaki rnd() — deterministik hash
      function rnd2(seed, k) {
        var s = Math.sin((seed + 1) * 12.9898 * (k + 1)) * 43758.5453;
        return s - Math.floor(s);
      }
      // referanstaki packCircle — hex paketleme, merkeze en yakın n nokta
      function packCircle2(n, spacing) {
        var pts = [], R = Math.ceil(Math.sqrt(n)) + 2;
        for (var q = -R; q <= R; q++)
          for (var row = -R; row <= R; row++) {
            var x = spacing * (q + row / 2), y = spacing * (row * Math.sqrt(3) / 2);
            pts.push({ x: x, y: y, d: Math.hypot(x, y) });
          }
        pts.sort(function (a, b) { return a.d - b.d; });
        return pts.slice(0, n).sort(function (a, b) { return a.y - b.y; });
      }
      // referanstaki Cell — parlak blastomer (radial gradient + çekirdek + spekular)
      function drawCell2(cx, cy, r, hue, light, bright) {
        bright = bright || 1;
        var g = bctx.createRadialGradient(cx - r * 0.28, cy - r * 0.40, r * 0.05, cx, cy, r);
        g.addColorStop(0.00, 'hsla(' + hue + ',85%,98%,' + (0.96 * bright) + ')');
        g.addColorStop(0.13, 'hsl(' + hue + ',80%,' + Math.min(90, light + 16) + '%)');
        g.addColorStop(0.42, 'hsl(' + hue + ',72%,' + light + '%)');
        g.addColorStop(0.74, 'hsl(' + hue + ',64%,' + (light - 16) + '%)');
        g.addColorStop(1.00, 'hsl(' + hue + ',56%,' + (light - 28) + '%)');
        bctx.beginPath(); bctx.arc(cx, cy, r, 0, Math.PI * 2); bctx.fillStyle = g; bctx.fill();
        // çekirdek
        var ng = bctx.createRadialGradient(cx - r * 0.03, cy + r * 0.02, 0, cx, cy + r * 0.04, r * 0.23);
        ng.addColorStop(0, 'hsla(' + hue + ',48%,62%,.5)');
        ng.addColorStop(0.68, 'hsla(' + hue + ',62%,40%,.28)');
        ng.addColorStop(1, 'hsla(' + hue + ',62%,40%,0)');
        bctx.beginPath(); bctx.arc(cx, cy + r * 0.04, r * 0.23, 0, Math.PI * 2); bctx.fillStyle = ng; bctx.fill();
        // spekular highlight
        var sg = bctx.createRadialGradient(cx + r * 0.02, cy - r * 0.10, 0, cx + r * 0.02, cy - r * 0.10, r * 0.25);
        sg.addColorStop(0, 'rgba(255,255,255,0.92)'); sg.addColorStop(1, 'rgba(255,255,255,0)');
        bctx.save(); bctx.translate(cx + r * 0.02, cy - r * 0.10); bctx.rotate(-0.38);
        bctx.scale(1, 0.68); bctx.beginPath(); bctx.arc(0, 0, r * 0.25, 0, Math.PI * 2);
        bctx.fillStyle = sg; bctx.fill(); bctx.restore();
      }
      // leader etiketi metinleri (TR varsayılan; data-tr/en mantığına uyumlu)
      var BLAST_LABELS = {
        tr: [
          { t: 'Trofektoderm', s: 'dış hücre tabakası' },
          { t: 'İç Hücre Kitlesi', s: 'embriyonun kendisi' },
          { t: 'Blastosöl', s: 'sıvı dolu boşluk' }
        ],
        en: [
          { t: 'Trophectoderm', s: 'outer cell layer' },
          { t: 'Inner cell mass', s: 'the embryo proper' },
          { t: 'Blastocoel', s: 'fluid-filled cavity' }
        ]
      };
      var blastLang = LANG;
      var zpHidden = false;

      // referanstaki Blastocyst kompozisyonu — p: kavitasyon ilerlemesi (0..1)
      function renderBlast2d(p, labelP, tm) {
        bctx.setTransform(B2DPR, 0, 0, B2DPR, 0, 0);
        bctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        var W = window.innerWidth, H = window.innerHeight;
        var cx = W * 0.5, cy = H * 0.5;
        var isMobile = W < 560;
        // Embriyo görsel yarıçapı ~235px (ring 188 + hücre 47). Etiketler için pay bırak.
        var contentR = 235;
        var marginFactor = isMobile ? 0.30 : 0.34;   // ekranın ne kadarını embriyo kaplasın
        var scale = Math.min(W, H) * marginFactor / contentR;
        bctx.save();
        bctx.translate(cx, cy);
        bctx.scale(scale, scale);

        // blastosöl — sıvı boşluk (amber radial)
        var cavR = 182 * p, cavOp = 0.9 * p;
        var cg = bctx.createRadialGradient(18 - cavR * 0.1, 26 - cavR * 0.1, cavR * 0.1, 18, 26, cavR);
        cg.addColorStop(0, 'hsla(40,88%,88%,' + (0.55 * cavOp) + ')');
        cg.addColorStop(0.45, 'hsla(35,72%,74%,' + (0.40 * cavOp) + ')');
        cg.addColorStop(1, 'hsla(30,64%,58%,' + (0.32 * cavOp) + ')');
        bctx.beginPath(); bctx.arc(18, 26, Math.max(0.1, cavR), 0, Math.PI * 2);
        bctx.fillStyle = cg; bctx.fill();

        // trofoblast duvarı — 15 hücre çember
        var TROPHO = 15, ringR = 188, cellR = lerp(40, 47, p);
        var tropho = [];
        for (var i = 0; i < TROPHO; i++) {
          var a = (-90 + i * (360 / TROPHO)) * Math.PI / 180;
          var delay = clamp((p - i / TROPHO * 0.15) / (1 - 0.15), 0, 1);
          var rad = lerp(58, ringR, ease(delay));
          tropho.push({ x: Math.cos(a) * rad, y: Math.sin(a) * rad, r: cellR, hue: 34 + (rnd2(i, 5) - 0.5) * 10 });
        }
        tropho.sort(function (A, B) { return A.y - B.y; });

        // iç hücre kitlesi — sol-üst kutupta sıkı küme
        var icmA = -128 * Math.PI / 180, icmRad = 118;
        var icmCx = Math.cos(icmA) * icmRad, icmCy = Math.sin(icmA) * icmRad;
        var icm = packCircle2(7, 56).map(function (q, i) {
          return { x: icmCx + q.x * lerp(0.3, 1, p), y: icmCy + q.y * lerp(0.3, 1, p), r: 50, hue: 37 + (rnd2(i, 7) - 0.5) * 8 };
        });

        tropho.forEach(function (c) { drawCell2(c.x, c.y, c.r, c.hue, 70, 1); });
        icm.sort(function (A, B) { return A.y - B.y; }).forEach(function (c) { drawCell2(c.x, c.y, c.r, c.hue, 75, 1.05); });
        bctx.restore();

        // leader-line etiketleri (ekran koordinatında)
        if (labelP > 0.01) {
          var L = BLAST_LABELS[blastLang];
          var anchors;
          if (isMobile) {
            // Mobilde: etiketler üst/alt köşelere yakın, kısa çizgiler, ekrandan taşmasın
            var topY = Math.max(26, cy - contentR * scale - 22);
            var botY = Math.min(H - 30, cy + contentR * scale + 26);
            anchors = [
              { ax: cx + Math.cos(-52 * Math.PI / 180) * 188 * scale, ay: cy + Math.sin(-52 * Math.PI / 180) * 188 * scale, lx: Math.min(W - 12, cx + 70 * scale), ly: topY, align: 'left' },
              { ax: cx + icmCx * scale, ay: cy + icmCy * scale, lx: Math.max(12, cx - 90 * scale), ly: topY + 18, align: 'right' },
              { ax: cx + 36 * scale, ay: cy + 96 * scale, lx: Math.max(12, cx - 40 * scale), ly: botY, align: 'left' }
            ];
          } else {
            anchors = [
              { ax: cx + Math.cos(-52 * Math.PI / 180) * 188 * scale, ay: cy + Math.sin(-52 * Math.PI / 180) * 188 * scale, lx: Math.min(W - 30, cx + 230 * scale), ly: cy - 150 * scale, align: 'left' },
              { ax: cx + icmCx * scale, ay: cy + icmCy * scale, lx: Math.max(30, cx - 210 * scale), ly: cy - 70 * scale, align: 'right' },
              { ax: cx + 36 * scale, ay: cy + 96 * scale, lx: Math.max(30, cx - 190 * scale), ly: cy + 180 * scale, align: 'left' }
            ];
          }
          bctx.save(); bctx.globalAlpha = labelP;
          anchors.forEach(function (an, i) {
            bctx.strokeStyle = 'rgba(240,184,120,.5)'; bctx.lineWidth = 1.2;
            bctx.beginPath(); bctx.moveTo(an.ax, an.ay); bctx.lineTo(an.lx, an.ly); bctx.stroke();
            bctx.beginPath(); bctx.arc(an.ax, an.ay, 2.5, 0, Math.PI * 2); bctx.fillStyle = 'rgba(240,184,120,.8)'; bctx.fill();
            bctx.textAlign = an.align === 'right' ? 'right' : 'left';
            bctx.fillStyle = '#f0b878'; bctx.font = '500 13px "JetBrains Mono", monospace';
            bctx.fillText(L[i].t, an.lx + (an.align === 'right' ? -6 : 6), an.ly - 2);
            bctx.fillStyle = '#8a6a63'; bctx.font = '400 11px "JetBrains Mono", monospace';
            bctx.fillText(L[i].s, an.lx + (an.align === 'right' ? -6 : 6), an.ly + 12);
          });
          bctx.restore();
        }
      }

      // 3D embriyo nesnelerini blastosist sırasında gizle (2D devralır)
      function setEmbryoVisible(vis) {
        for (var i = 0; i < cells.length; i++) cells[i].visible = cells[i].visible && vis;
        if (!vis) {
          zpMesh.visible = false; zpHidden = true;
        } else {
          zpMesh.visible = true;
        }
      }

      // ---- animate ----
      var prev = performance.now();
      function frame(now) {
        var dt = Math.min((now - prev) / 1000, 0.05); prev = now; var tm = now / 1000;
        if (playing) { gv += dt * 0.34; if (gv >= LAST) { gv = LAST; playing = false; syncPlay(); } }
        zpMat.uniforms.uTime.value = tm;
        apply(gv, tm, dt);
        spermUpdate(gv, tm);
        ctrl.idle += dt;
        if (!RM && !ctrl.drag && !playing && ctrl.idle > 2.2) ctrl.tAz += dt * 0.055;
        if (playing && !ctrl.drag) ctrl.tAz += dt * 0.038;
        ctrl.az = lerp(ctrl.az, ctrl.tAz, 0.08);
        ctrl.pol = lerp(ctrl.pol, ctrl.tPol, 0.08);
        ctrl.dist = lerp(ctrl.dist, ctrl.tDist, 0.08);
        camera.position.set(
          ctrl.dist * Math.sin(ctrl.pol) * Math.cos(ctrl.az),
          ctrl.dist * Math.cos(ctrl.pol),
          ctrl.dist * Math.sin(ctrl.pol) * Math.sin(ctrl.az));
        camera.lookAt(0, 0, 0);
        dustMesh.rotation.y += dt * 0.009;
        
        // 2D blastosist overlay crossfade
        var ov = clamp((curBlastF - 0.30) / 0.30, 0, 1);  // 0.30→0.60 arası belir
        bcv.style.opacity = ov;
        if (ov > 0.01) {
          // referanstaki kavitasyon eğrisi: p = blastF eşlemesi
          var p2 = ease(clamp((curBlastF - 0.15) / 0.85, 0, 1));
          var labelP2 = clamp((curBlastF - 0.55) / 0.30, 0, 1);
          renderBlast2d(p2, labelP2, tm);
          if (ov > 0.6) setEmbryoVisible(false);  // 3D embriyoyu gizle, 2D devralsın
          else if (zpHidden) { zpMesh.visible = true; zpHidden = false; }
        } else if (zpHidden) {
          // blastosistten çıkıldı: 3D katmanları geri aç
          zpMesh.visible = true; zpHidden = false;
        }
        updateUI(); renderer.render(scene, camera); requestAnimationFrame(frame);
      }
      window.addEventListener('resize', function () {
        var d = responsiveCamera();
        // mevcut zoom oranını koruyarak yeni baz mesafeye uyarla
        renderer.setSize(window.innerWidth, window.innerHeight);
        ctrl.tDist = clamp(ctrl.tDist, 4.0, 13);
        sizeBlast2d();
      });
      apply(0, 0, 0); updateUI(); syncPlay(); requestAnimationFrame(frame);
    })();
  </script>
</body>
